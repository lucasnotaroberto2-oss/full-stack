<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>criar post</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <form method="post" action="/criar_post">
        <div class="inputs">
            <div>
                <h1>Título:</h1>
                <input type="text" name="titulo_post">
            </div>
            <div>
                <h1>Resumo:</h1>
                <input type="text" name="resumo_post">
            </div>
            <div>
                <h1>Conteúdo:</h1>
                <input type="text" name="conteudo_post">
            </div>
            <div>
                <p></p>
                <input type="submit" value="Criar Post">
            </div>
        </div>
    </form>
</body>
</html>
